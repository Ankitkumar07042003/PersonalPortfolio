version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: portfolio_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ankit_portfolio

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ankit_portfolio
      - CLIENT_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio_client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo_data:
